services:
  db:
    image: mariadb:10.11
    container_name: casemix-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: casemix_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: casemix-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://root:rootpassword@db:3306/casemix_db
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      NODE_ENV: production
    depends_on:
      - db

volumes:
  mysql_data:
